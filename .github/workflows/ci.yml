name: Free2PA CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests
        run: npm run check

      - name: Verify trusted demo skill
        uses: ./
        with:
          path: public/demo/trusted
          trust-store: demo_certs

      - name: Upload verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: free2pa-verification-report
          path: free2pa-report.json
