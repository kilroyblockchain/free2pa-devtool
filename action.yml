name: Free2PA Verify
description: Verify AI agent skills against an explicit publisher trust group
author: Free2PA

branding:
  icon: shield
  color: green

inputs:
  path:
    description: Repository-relative directory to scan for SKILL.md files
    required: false
    default: .
  trust-store:
    description: Repository-relative directory containing trusted public .crt files
    required: true
  report:
    description: Repository-relative path for the JSON verification report
    required: false
    default: free2pa-report.json

outputs:
  report:
    description: Absolute path to the JSON verification report
    value: ${{ steps.verify.outputs.report }}

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Free2PA
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm ci --omit=dev --ignore-scripts

    - name: Verify agent skills
      id: verify
      shell: bash
      env:
        FREE2PA_SCAN_PATH: ${{ inputs.path }}
        FREE2PA_TRUST_STORE: ${{ inputs.trust-store }}
        FREE2PA_REPORT: ${{ inputs.report }}
      run: |
        set +e
        node "$GITHUB_ACTION_PATH/bin/free2pa.js" scan \
          "$GITHUB_WORKSPACE/$FREE2PA_SCAN_PATH" \
          --trust-store "$GITHUB_WORKSPACE/$FREE2PA_TRUST_STORE" \
          --json > "$GITHUB_WORKSPACE/$FREE2PA_REPORT"
        status=$?
        cat "$GITHUB_WORKSPACE/$FREE2PA_REPORT"
        echo "report=$GITHUB_WORKSPACE/$FREE2PA_REPORT" >> "$GITHUB_OUTPUT"
        exit "$status"
