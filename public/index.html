<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Free2PA | Tamper-evident controls for your agents</title>
  <meta name="description" content="Free2PA provides C2PA-style tamper detection for agent control files before they enter model context.">
  <meta http-equiv="refresh" content="0; url=/hello-world.html">
  <link rel="canonical" href="/hello-world.html">
  <link rel="icon" href="/free2pa-mark.svg" type="image/svg+xml">
  <style>
    :root {
      --bg: #e9e2cf;
      --ink: #171717;
      --paper: #fffdf4;
      --line: #171717;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 18px 18px, rgba(23,23,23,.08) 1px, transparent 1px),
        var(--bg);
      background-size: 24px 24px;
      color: var(--ink);
      font-family: ui-monospace, "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    }
    main {
      width: min(560px, calc(100% - 32px));
      border: 2px solid var(--line);
      background: var(--paper);
      box-shadow: 8px 8px 0 var(--line);
      padding: 24px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 1.35rem;
      line-height: 1.1;
      letter-spacing: -.04em;
    }
    p { margin: 0; line-height: 1.45; }
    a { color: var(--ink); font-weight: 900; }
  </style>
</head>
<body>
  <main>
    <h1>Opening the Free2PA Hello World demo.</h1>
    <p>If the page does not redirect, <a href="/hello-world.html">open the demo</a>.</p>
  </main>
  <script>window.location.replace('/hello-world.html');</script>
</body>
</html>
